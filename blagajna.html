<main>


<section class="checkout">


<h1>
💳 Blagajna
</h1>


<div class="checkout-container">


<div class="order-box">


<h2>
Tvoje naročilo
</h2>


<div id="checkoutItems">

</div>


<h3>

Skupaj:
<span id="checkoutTotal">
0 €
</span>

</h3>


</div>



<div class="form-box">


<h2>
Podatki kupca
</h2>


<form id="checkoutForm">


<input 
type="text"
id="customerName"
placeholder="Ime in priimek"
required>


<input
type="text"
id="customerAddress"
placeholder="Naslov"
required>


<input
type="tel"
id="customerPhone"
placeholder="Telefon"
required>


<button type="submit">

Oddaj naročilo

</button>


</form>


</div>


</div>
