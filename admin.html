<!DOCTYPE html>
<html lang="sl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | Gelaterija Brstowc</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">

</head>


<body>


<header>

<nav class="navbar">

<h2 class="logo">
🍦 Admin - Gelaterija Brstowc
</h2>

<a href="index.html">
Domov
</a>

</nav>

</header>



<main>


<section class="admin">

<h1>
📦 Vsa naročila
</h1>

  <hr>

<section class="admin-flavors">

<h2>🍦 Dodaj nov okus</h2>

<form id="addFlavorForm">

<input
type="text"
id="flavorName"
placeholder="Ime okusa"
required>

<textarea
id="flavorDescription"
placeholder="Opis okusa"
required></textarea>

<input
type="number"
id="flavorPrice"
placeholder="Cena (€)"
step="0.01"
required>

<select id="flavorCategory" required>

<option value="sadni">Sadni</option>
<option value="kremni">Kremni</option>
<option value="čokoladni">Čokoladni</option>
<option value="veganski">Veganski</option>
<option value="posebni">Posebni</option>

</select>

<input
type="text"
id="flavorImage"
placeholder="Ime slike (npr. sladoled_jagoda.png)"
required>

<label>

<input
type="checkbox"
id="flavorAvailable"
checked>

Na voljo

</label>

<button type="submit">

➕ Dodaj okus

</button>

</form>

</section>


<div id="adminOrders">

<!-- naročila se prikažejo tukaj -->

</div>


</section>


</main>



<footer>

<p>
© 2026 Gelaterija Brstowc
</p>

</footer>


<script type="module" src="js/admin.js"></script>


</body>

</html>
