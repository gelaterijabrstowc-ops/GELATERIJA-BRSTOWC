<body>

<header>

<nav class="navbar">

<h2 class="logo">

<ul class="nav-links">

</ul>

<div class="nav-buttons">

<button id="darkMode">
🌙
</button>

</div>

</nav>

</header>

<main>

<section class="account">

<h1>Moj račun</h1>

<div class="account-container">

<!-- PRIJAVA -->

<div class="login-box">

<h2>Prijava</h2>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="E-pošta"
required>

<input
type="password"
id="loginPassword"
placeholder="Geslo"
required>

<button type="submit">

Prijava

</button>

</form>

</div>

<!-- REGISTRACIJA -->

<div class="register-box">

<h2>Registracija</h2>

<form id="registerForm">

<input
type="text"
id="registerName"
placeholder="Ime in priimek"
required>

<input
type="email"
id="registerEmail"
placeholder="E-pošta"
required>

<input
type="password"
id="registerPassword"
placeholder="Geslo"
required>

<input
type="password"
id="registerPassword2"
placeholder="Ponovi geslo"
required>

<button type="submit">

Ustvari račun

</button>

</form>

</div>

</div>

<!-- PO PRIJAVI -->

<section id="userPanel" style="display:none;">

<h2>Dobrodošli!</h2>

<p id="userName"></p>

<p id="userEmail"></p>

<div class="account-buttons">

<a href="kosarica.html" class="btn">

Moja košarica

</a>

<a href="#orders" class="btn">

Moja naročila

</a>

<button id="logoutButton">

Odjava

</button>

</div>

</section>

</section>

</main>

    <section id="orders">

<h2>
📦 Moja naročila
</h2>

<div id="ordersContainer">

</div>

</section>
    
<footer>

<p>

</p>

</footer>

<script type="module" src="js/racun.js"></script>

</body>

</html>
